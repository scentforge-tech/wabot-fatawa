steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/wabot-fatawa', '.']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/wabot-fatawa']

  # Deploy to Cloud Run
  # ─────────────────────────────────────────────────────────────────────────────
  # Auth flow: Cloud Run downloads WhatsApp credentials from GCS at startup.
  # The FIREBASE_SERVICE_ACCOUNT_JSON secret provides credentials for GCS access.
  # To create/update the secret:
  #   gcloud secrets create FIREBASE_SERVICE_ACCOUNT_JSON \
  #     --data-file=firebase-service-account.json
  # ─────────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'wabot-fatawa'
      - '--image=gcr.io/$PROJECT_ID/wabot-fatawa'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--timeout=3600'
      - '--port=8080'
      - '--set-env-vars=NODE_ENV=production,GCS_AUTH_BUCKET=masjidmap-5yvj5-wabot-auth'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,ADMIN_GROUP_JID=ADMIN_GROUP_JID:latest,PUBLIC_GROUP_JID=PUBLIC_GROUP_JID:latest,FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest'
      - '--service-account=firebase-adminsdk-fbsvc@masjidmap-5yvj5.iam.gserviceaccount.com'

images:
  - 'gcr.io/$PROJECT_ID/wabot-fatawa'
