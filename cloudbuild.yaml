steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/wabot-fatawa', '.']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/wabot-fatawa']

  # Deploy to Cloud Run
  # ─────────────────────────────────────────────────────────────────────────────
  # REQUIRED: Set these secrets in Google Secret Manager BEFORE deploying:
  #   gcloud secrets create GEMINI_API_KEY --data-file=- <<< "your-key"
  #   gcloud secrets create ADMIN_GROUP_JID --data-file=- <<< "120363410146314352@g.us"
  #   gcloud secrets create PUBLIC_GROUP_JID --data-file=- <<< "120363411626539147@g.us"
  #   gcloud secrets create FIREBASE_PROJECT_ID --data-file=- <<< "masjidmap-5yvj5"
  #
  # Cloud Run uses the attached service account for Firebase (Application Default Credentials)
  # No firebase-service-account.json needed in the container.
  # ─────────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'wabot-fatawa'
      - '--image=gcr.io/$PROJECT_ID/wabot-fatawa'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--timeout=3600'
      - '--port=8080'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,ADMIN_GROUP_JID=ADMIN_GROUP_JID:latest,PUBLIC_GROUP_JID=PUBLIC_GROUP_JID:latest'

images:
  - 'gcr.io/$PROJECT_ID/wabot-fatawa'
