steps:
  # ── Step 0: Restore WhatsApp auth from GCS ─────────────────────────────────
  # Downloads auth_info_baileys/ into the build workspace so Docker can bake
  # the credentials directly into the image (no runtime GCS access needed).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        mkdir -p auth_info_baileys
        # Placeholder ensures dir is NEVER empty — Docker excludes empty dirs from
        # the build context, which makes COPY fail with "file does not exist"
        touch auth_info_baileys/.gitkeep

        echo "Listing GCS bucket..."
        gsutil ls gs://masjidmap-5yvj5-wabot-auth/auth/ 2>&1 | head -5 || echo "ls failed"

        echo "Downloading auth files..."
        if gsutil -m cp "gs://masjidmap-5yvj5-wabot-auth/auth/*" auth_info_baileys/; then
          echo "Auth restored: $(ls auth_info_baileys/ | grep -v .gitkeep | wc -l) files"
        else
          echo "GCS download failed - bot will show QR page on startup"
        fi

  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/wabot-fatawa', '.']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/wabot-fatawa']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'wabot-fatawa'
      - '--image=gcr.io/$PROJECT_ID/wabot-fatawa'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--timeout=3600'
      - '--port=8080'
      - '--set-env-vars=NODE_ENV=production,GCS_AUTH_BUCKET=masjidmap-5yvj5-wabot-auth'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,ADMIN_GROUP_JID=ADMIN_GROUP_JID:latest,PUBLIC_GROUP_JID=PUBLIC_GROUP_JID:latest'

images:
  - 'gcr.io/$PROJECT_ID/wabot-fatawa'
